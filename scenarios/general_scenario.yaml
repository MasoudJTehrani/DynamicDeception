# Configuration for the CARLA simulation scenario
# This sets up the general scenario. other config files are designed for each evaluation types
# The main.py code uses the #_evaluation.json file to evaluate different setups

town: "Town07"

# Weather info
sun_altitude_angle: 120.0
sun_azimuth_angle: 20.0

# NPCs spawn location
npc_spawn_points: [22, 46, 45, 108] # Sometimes needs to be changed.

# Ego vehicle start and ending location
start_x: 28
start_y: 59
start_z: 1
end_x: -13
end_y: 58
end_z: 1

# Skip the scenario if this amount of time is passed to avoid infinite loop
time_allowed: 180

# How many times a scenario is ran
num_iterations: 10
